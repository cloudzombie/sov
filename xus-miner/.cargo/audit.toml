# Standalone-miner cargo-audit baseline. Zero vulnerabilities and zero yanked
# crates are allowed. These informational waivers mirror the reviewed SOV chain
# baseline because this client imports the same proof-of-work crate by path.

[advisories]
ignore = [
  # Feature-gated bare-metal shim; not compiled on supported desktop targets.
  "RUSTSEC-2023-0089",
  # Build-time proc macro inherited from the upstream Orchard dependency tree.
  "RUSTSEC-2026-0173",
  # Optional Linux Wayland protocol generator dependency retained in eframe's
  # cross-platform lock graph. It only parses crate-bundled protocol XML at
  # build time and is absent from the macOS release dependency graph.
  "RUSTSEC-2026-0194",
  "RUSTSEC-2026-0195",
  # Optional backend dependency retained by eframe for non-selected render /
  # platform targets. `cargo tree -i memmap2` is empty for the macOS release.
  "RUSTSEC-2026-0186",
]
