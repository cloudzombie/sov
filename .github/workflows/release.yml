name: release

# Build the SOV Station desktop wallet/node app for Windows and macOS (and the
# headless Linux node daemon), and attach the artifacts to a GitHub Release. Builds
# run natively on each OS runner (RandomX's C++ library compiles cleanly there,
# unlike a mingw cross-build from macOS), so the binaries are real, not cross-compiled.
#
# The desktop app is self-contained: it runs a node IN-PROCESS with both the mainnet
# and testnet chain specs embedded, and defaults to MAINNET.
#
# Trigger: push a tag like `v0.1.0`, or run manually from the Actions tab.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

# VERSION CONSISTENCY: bake the release tag into the node daemon's reported version
# (`SOV_VERSION`, used by the P2P agent string `sov/vX.Y.Z`, `sov_version`, and
# `sov_getPeerInfo`). `chain/crates/rpc/build.rs` prefers this explicit override over
# `git describe` (which the rust-cache can defeat, shipping a stale version — the exact
# bug that made a v0.1.93 build advertise `sov/v0.1.89`). Combined with the gate's
# `tag == node/Cargo.toml` guard (Station shows CARGO_PKG_VERSION), EVERY version the
# software broadcasts — app, daemon, RPC, handshake — equals the tag. Consistent, always.
env:
  SOV_BUILD_VERSION: ${{ github.ref_name }}

jobs:
  # HARD GATE — nothing builds or publishes unless the genesis is byte-for-byte
  # frozen (double-locked: the pinned hashes are unchanged AND genesis rebuilds to
  # them) and the full verification surface is green. --strict allows no skips.
  gate:
    name: release gate (genesis double-lock + full verification)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # VERSION GUARD — the release tag MUST equal node/Cargo.toml's version, because
      # SOV Station displays CARGO_PKG_VERSION (from node/Cargo.toml). A tag cut while
      # that version is stale ships an app whose in-app version lies (e.g. a v0.1.93
      # tag on a 0.1.91 binary). Every build job `needs: gate`, so failing here blocks
      # the whole release — no matter whether the tag was cut via release-gate.sh or by
      # a bare `git tag`. This makes the glaring "wrong version in the app" impossible.
      - name: Version guard (tag == node/Cargo.toml == what SOV Station shows)
        run: |
          TAG="${GITHUB_REF_NAME}"
          CARGO_VER="$(grep -m1 '^version' node/Cargo.toml | cut -d'"' -f2)"
          echo "release tag: $TAG   node/Cargo.toml: $CARGO_VER"
          if [ "$TAG" != "v$CARGO_VER" ]; then
            echo "::error::Release tag '$TAG' != node/Cargo.toml version '$CARGO_VER'. SOV Station would display '$CARGO_VER'. Bump node/Cargo.toml to '${TAG#v}' (and refresh node/Cargo.lock), commit, then re-cut the tag."
            exit 1
          fi
          echo "OK — SOV Station will display $CARGO_VER, matching tag $TAG"
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: chain
          cache-on-failure: true
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: HARD GATE — scripts/release-gate.sh --strict
        run: scripts/release-gate.sh --strict

  windows:
    needs: gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@1.97.0
      # Cache compiled dependencies across runs. The heavy deps (egui, halo2/orchard,
      # RandomX, the PQ crypto) dominate a cold release build; caching them turns a ~9
      # min from-scratch compile into a couple of minutes that only rebuilds OUR crates.
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: |
            node
            chain
          cache-on-failure: true
      - name: Build GUI (release)
        shell: bash
        run: cargo build --release --manifest-path node/Cargo.toml
      - name: Stage bundle
        shell: bash
        run: |
          mkdir -p "dist/SOV-Station"
          cp node/target/release/sov-station.exe "dist/SOV-Station/"
          cp .github/STATION-README.txt "dist/SOV-Station/READ ME.txt" || true
          cd dist && 7z a "SOV-Station-${GITHUB_REF_NAME}-windows-x64.zip" "SOV-Station"
      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: windows
          path: dist/*.zip

  macos:
    needs: gate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: |
            node
            chain
          cache-on-failure: true
      - name: Build GUI (release)
        run: cargo build --release --manifest-path node/Cargo.toml
      - name: Bundle .app + .dmg
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME:-0.0.0}"
          STAGE="dist/stage"; APP="$STAGE/SOV Station.app"; MAC="$APP/Contents/MacOS"
          mkdir -p "$MAC" "$APP/Contents/Resources" dist
          cp node/target/release/sov-station "$MAC/sov-station"
          chmod +x "$MAC/"*
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>SOV Station</string>
            <key>CFBundleDisplayName</key><string>SOV Station</string>
            <key>CFBundleIdentifier</key><string>sov.station</string>
            <key>CFBundleVersion</key><string>0.1.0</string>
            <key>CFBundleShortVersionString</key><string>${VER}</string>
            <key>CFBundleExecutable</key><string>sov-station</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          PLIST
          cp .github/STATION-README.txt "$STAGE/READ ME.txt" || true
          # Ad-hoc sign the binary first, then the bundle (Apple Silicon requires a
          # valid signature to run at all). --deep is deprecated and can corrupt the
          # signature, so sign explicitly. Not notarized (no paid Apple account) — users
          # clear quarantine with `xattr -cr` per the READ ME.
          codesign --force --options runtime --sign - "$MAC/sov-station" || true
          codesign --force --sign - "$APP" || true
          ( cd "$STAGE" && ln -sf /Applications Applications )
          hdiutil create -volname "SOV Station" -srcfolder "$STAGE" -ov -format UDZO "dist/SOV-Station-${VER}-macOS.dmg"
      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: macos
          path: dist/*.dmg

  linux:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: chain
          cache-on-failure: true
      - name: Build headless node daemon + operator helper (release)
        run: |
          cargo build --release --manifest-path chain/Cargo.toml --bin sov-rpcd --bin sov-testnet
      - name: Stage Linux node bundle (for VPS / server deployment)
        shell: bash
        run: |
          STAGE="dist/SOV-Node"
          mkdir -p "$STAGE"
          cp chain/target/release/sov-rpcd "$STAGE/"
          cp chain/target/release/sov-testnet "$STAGE/"
          cp chain/testnet/sov-rpcd.service "$STAGE/"
          cp chain/testnet/RUNBOOK.md "$STAGE/"
          chmod +x "$STAGE/sov-rpcd" "$STAGE/sov-testnet"
          cd dist && tar czf "SOV-Node-${GITHUB_REF_NAME}-linux-x64.tar.gz" "SOV-Node"
      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: linux
          path: dist/*.tar.gz

  release:
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    # Supply-chain provenance needs OIDC (Sigstore keyless signing + build
    # provenance attestation) and the ability to write attestations; contents:write
    # publishes the release. The top-level grant is contents:write only, so widen it
    # here (job-level permissions REPLACE the top-level set, they don't merge).
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with: { path: artifacts }
      # Checkout is needed to generate the SBOM from the chain workspace.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: src
      - uses: dtolnay/rust-toolchain@1.97.0

      # ── Provenance step 1: SHA256SUMS over every published artifact ──
      # Flatten path so the checksum file names match the uploaded asset names.
      - name: Collect artifacts + SHA256SUMS
        run: |
          mkdir -p publish
          find artifacts -type f -exec cp {} publish/ \;
          ( cd publish && sha256sum -- * > SHA256SUMS )
          echo "== SHA256SUMS =="; cat publish/SHA256SUMS

      # ── Provenance step 2: CycloneDX SBOM for the chain workspace ──
      - name: Generate CycloneDX SBOM
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --manifest-path src/chain/Cargo.toml --format json
          # cargo-cyclonedx writes one bom per workspace member next to its manifest
          # (naming has varied across versions: `*.cdx.json` or `bom.json`); gather
          # whichever it produced into a single attachable archive.
          find src/chain \( -name '*.cdx.json' -o -name 'bom.json' \) -print0 \
            | tar --null -czf "publish/SOV-SBOM-${GITHUB_REF_NAME}-cyclonedx.tar.gz" --files-from -
          echo "== SBOM members =="; find src/chain \( -name '*.cdx.json' -o -name 'bom.json' \)

      # ── Provenance step 3: keyless (Sigstore/OIDC) signature of SHA256SUMS ──
      # No pre-shared secret: the runner's OIDC identity is the signer. Verifiable
      # with `cosign verify-blob`. Certificate + signature both attached.
      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
      - name: Sign SHA256SUMS (keyless)
        run: |
          cd publish
          cosign sign-blob --yes \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem \
            SHA256SUMS

      # ── Provenance step 4: GitHub build-provenance attestation for the binaries ──
      - name: Attest build provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: |
            publish/*.zip
            publish/*.dmg
            publish/*.tar.gz

      - name: Publish release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: |
            artifacts/**/*
            publish/SHA256SUMS
            publish/SHA256SUMS.sig
            publish/SHA256SUMS.pem
            publish/SOV-SBOM-${{ github.ref_name }}-cyclonedx.tar.gz
          prerelease: false
          name: "SOV Station ${{ github.ref_name }}"
          body: |
            **SOV Station — the desktop wallet + node for SOV (XUS) mainnet.**

            The app runs a node **in-process** and opens on **Mainnet** (genesis
            `cb0272ff…`, live since midnight July 4, 2026). Create or import a wallet,
            hold and send XUS (transparent or shielded), and optionally mine.

            SOV is a young network — live, but new and **not yet independently
            audited**. Hold funds accordingly.

            - **macOS:** `SOV-Station-*-macOS.dmg` (Apple Silicon). Unsigned —
              right-click → Open the first time (Gatekeeper).
            - **Windows:** `SOV-Station-*-windows-x64.zip` — unzip and run
              `sov-station.exe`. Unsigned — SmartScreen → More info → Run anyway.
            - **Linux (server / VPS):** `SOV-Node-*-linux-x64.tar.gz` — the headless
              `sov-rpcd` daemon + operator helper + a `systemd` unit and runbook. Run a
              node with `journalctl -u sov-rpcd -f`; see `RUNBOOK.md` in the tarball.

            The desktop app runs the node in-process; closing the app stops it. The
            Linux daemon runs standalone under systemd (`Restart=always`, resumes from
            its fsync'd block log).
