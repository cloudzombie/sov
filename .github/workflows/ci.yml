name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Platform-agnostic checks: run once on Linux.
  lint:
    name: fmt · clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        # The Cargo workspace lives in chain/ (the explorer is a separate project).
        working-directory: chain
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: chain
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Build + test on every supported client platform. SOV nodes, miner, and wallet
  # must run on macOS and Windows as well as Linux — this proves it on each push.
  test:
    name: build · test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: chain
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0
      - name: Cache cargo
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: chain
      # Debug build, not --release: the release profile is codegen-units=1 + thin-LTO
      # (slowest-possible compile) and the tests below run in debug anyway, so a
      # per-commit release build was ~10 min/OS of pure overhead. The optimized
      # release binaries are still fully built + verified on every tag by the
      # release workflow (release-gate --strict + reproducible build).
      - name: Build all binaries (debug)
        run: cargo build --workspace
      - name: Tests
        run: cargo test --workspace

  # The SOV Station desktop app (node/) is a SEPARATE cargo workspace the `test`
  # job above does NOT cover. This job gates it (fmt · clippy · tests) so a broken
  # node-start path — like "sov-testnet not built" — can never ship unnoticed again.
  station:
    name: SOV Station app (node/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: node
      - name: Formatting
        run: cd node && cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path node/Cargo.toml --all-targets -- -D warnings
      - name: Tests
        run: cargo test --manifest-path node/Cargo.toml

  # Verification & validity assurance (Phase 7): invariants, consensus model
  # check, deterministic replay, STF conformance, KAT vectors and fault injection
  # are a named, required gate. (They also run inside the workspace tests above;
  # this surfaces them as their own status check.)
  verify:
    name: verify (invariants · model-check · conformance · KAT)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chain
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: chain
      - name: Verification suite
        run: cargo test -p sov-verify

  # Smart-contract (guest) static analysis: the wasm32 contracts must pass clippy
  # with warnings denied and build in release.
  contracts:
    name: contracts (wasm32 · clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chain/contracts
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: chain/contracts
      - name: Clippy (deny warnings)
        # Lint the real guest targets (lib + any bins), NOT --all-targets: a `no_std`
        # crate that defines a `#[panic_handler]` (the SDK does) cannot link into the
        # std test harness `--all-targets` would build (duplicate `panic_impl` lang
        # item), and wasm32-unknown-unknown has no test runner anyway — so those test
        # targets are both unbuildable and un-runnable. The lib IS the deliverable.
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings
      - name: Build (release wasm)
        run: cargo build --target wasm32-unknown-unknown --release

  # Reproducible builds: build the release binaries twice and assert they are
  # bit-for-bit identical (scripts/reproducible-build.sh).
  reproducible:
    name: reproducible build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@1.97.0
      - name: Verify bit-for-bit reproducibility
        run: bash scripts/reproducible-build.sh

  # Supply-chain security gate: cargo-deny fails on any RustSec advisory affecting a
  # dependency AND enforces a version FLOOR on the consensus-critical zk crates, so
  # the patched orchard/halo2_gadgets (which fix the Orchard circuit soundness /
  # shielded-pool forgery bug) can never be silently downgraded. Config: chain/deny.toml.
  supply-chain:
    name: supply-chain (cargo-deny · advisories + zk floor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: cargo-deny (advisories + bans)
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          manifest-path: chain/Cargo.toml
          command: check advisories bans
      - uses: dtolnay/rust-toolchain@1.97.0
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit standalone Stratum bridge
        working-directory: tools/sov-stratum
        run: cargo audit --deny warnings

  # The coverage-guided fuzz targets must compile (fuzzing itself runs out-of-band
  # on nightly; this gates that the targets don't bit-rot).
  # Fuzzing (mirrors Bitcoin Core's fuzz jobs): BUILD every target under libFuzzer
  # instrumentation (required), then a short RUN of each so a decoder panic on
  # adversarial input surfaces. The run is trialed (non-blocking) until we've seen it
  # consistently green, then it becomes required.
  fuzz:
    name: fuzz (build + short run)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chain
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: chain
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Build fuzz targets
        run: cargo fuzz build
      - name: Run each target (30s)
        continue-on-error: true
        run: |
          for t in $(cargo fuzz list); do
            echo "::group::fuzz $t"
            cargo fuzz run "$t" -- -max_total_time=30 -rss_limit_mb=4096
            echo "::endgroup::"
          done

  # ── Hygiene lint suite (mirrors Bitcoin Core's test/lint/): shell scripts and
  # spelling. Both validated clean, so this is REQUIRED. (rustdoc -D warnings is
  # coming once the accumulated broken-doc-link backlog is cleared.) ──
  hygiene:
    name: hygiene (shellcheck · typos · rustdoc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: ShellCheck (release + build scripts)
        run: shellcheck scripts/*.sh
      - name: Spelling (typos)
        uses: crate-ci/typos@685eb3d55be2f85191e8c84acb9f44d7756f84ab # v1.29.4
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: chain
      - name: Docs build clean (rustdoc -D warnings)
        working-directory: chain
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps

  # ── Sanitizers (mirrors Bitcoin's ASan/TSan/MSan matrix, Rust-native). Trialed
  # non-blocking until consistently green on Linux, then promoted to required. ──
  sanitizers:
    name: sanitizers (ASan · Miri) [trial]
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: chain
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, miri
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: chain
      - name: AddressSanitizer (consensus · crypto · network)
        env:
          RUSTFLAGS: "-Zsanitizer=address"
        run: cargo +nightly test --target x86_64-unknown-linux-gnu -p sov-chain -p sov-crypto -p sov-network
      - name: Miri (encoding UB — types · primitives)
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"
        run: cargo +nightly miri test -p sov-types -p sov-primitives

  # ── Binary hardening (mirrors Zcash's sec-hard + Bitcoin's check-security),
  # tuned to what a Rust release binary provides. Trialed non-blocking; prints the
  # full checksec/ldd report and asserts PIE (ASLR). ──
  hardening:
    name: hardening (checksec release binary) [trial]
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: chain
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: chain
      - name: Build release daemon
        run: cargo build --release -p sov-rpc --bin sov-rpcd
      - name: Install checkers
        run: sudo apt-get update && sudo apt-get install -y checksec
      - name: Hardening report + assert PIE/NX
        run: |
          BIN=target/release/sov-rpcd
          echo "== file =="; file "$BIN"
          echo "== checksec =="; checksec --file="$BIN" || true
          echo "== dynamic deps =="; ldd "$BIN" || true
          # PIE (ASLR): the most important, reliably detectable via `file`.
          file "$BIN" | grep -q "pie executable" || { echo "FAIL: binary is not PIE"; exit 1; }
          # NX: GNU_STACK must not be executable (RW, not RWE).
          readelf -l "$BIN" | grep -A1 GNU_STACK | grep -q "RWE" && { echo "FAIL: executable stack"; exit 1; } || true
          echo "OK: PIE + non-exec stack (canary/FORTIFY are report-only for Rust)"

  # The TypeScript SDK (sdk/) is SOV's consensus SECOND CLIENT: it re-derives keys,
  # account ids, emission, the PoW seal, the STF and the KAT vectors independently of
  # the Rust node. Its vitest suite (which loads sdk/vectors) must stay green so the
  # two implementations can never silently diverge byte-for-byte.
  sdk:
    name: sdk (second client · vitest KAT)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/package-lock.json
      - name: Install deps (locked)
        run: npm ci
      - name: Tests (vitest)
        run: npm test

  # Standalone operator tools (tools/conformance, tools/tx-cannon, tools/sov-stratum) are intentionally
  # NOT chain-workspace members but depend on the real chain crates by path — so a
  # chain API change can silently break them. Compile them here so they can't bit-rot;
  # fully gate the Stratum bridge because it accepts untrusted miner input and is the
  # first practical path to external hashpower.
  tools:
    name: tools (conformance · tx-cannon · sov-stratum)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          # This job runs `cargo fmt` + `cargo clippy` on the tool crates, so the
          # toolchain must carry both components (the default minimal profile omits them,
          # which failed the "Format sov-stratum" step with "cargo-fmt is not installed").
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: |
            tools/conformance
            tools/tx-cannon
            tools/sov-stratum
      # tx-cannon links eframe/egui; install the standard egui Linux build deps so the
      # native GUI binary links on the headless runner.
      - name: Install egui build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libgtk-3-dev
      - name: Build conformance
        run: cargo build --manifest-path tools/conformance/Cargo.toml
      - name: Build tx-cannon
        run: cargo build --manifest-path tools/tx-cannon/Cargo.toml
      - name: Test tx-cannon
        run: cargo test --manifest-path tools/tx-cannon/Cargo.toml
      - name: Format sov-stratum
        run: cargo fmt --manifest-path tools/sov-stratum/Cargo.toml --all -- --check
      - name: Clippy sov-stratum (deny warnings)
        run: cargo clippy --manifest-path tools/sov-stratum/Cargo.toml --all-targets -- -D warnings
      - name: Test sov-stratum
        run: cargo test --manifest-path tools/sov-stratum/Cargo.toml

  # The Windows validator package ships PowerShell operator scripts
  # (windows/scripts/*.ps1). Lint them with PSScriptAnalyzer using the pwsh that ships
  # on the Ubuntu runner so a broken join/miner/seed script can't reach a user.
  # Trialed non-blocking (like sanitizers/hardening) until consistently green, then
  # promoted to required.
  powershell:
    name: powershell (PSScriptAnalyzer) [trial]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: PSScriptAnalyzer (windows/scripts/*.ps1)
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          # Print the FULL report (all severities) for visibility…
          Invoke-ScriptAnalyzer -Path windows -Recurse | Format-Table -AutoSize
          # …but only FAIL the check on Error-severity diagnostics. These operator
          # scripts have never been linted, so we gate on real errors now and can
          # tighten to Warning/Info once the style backlog is cleared (this job is
          # [trial]/continue-on-error until then).
          Invoke-ScriptAnalyzer -Path windows -Recurse -Severity Error -EnableExit
