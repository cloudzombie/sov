name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Platform-agnostic checks: run once on Linux.
  lint:
    name: fmt · clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        # The Cargo workspace lives in chain/ (the explorer is a separate project).
        working-directory: chain
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: chain
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Build + test on every supported client platform. SOV nodes, miner, and wallet
  # must run on macOS and Windows as well as Linux — this proves it on each push.
  test:
    name: build · test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: chain
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: chain
      - name: Build all binaries
        run: cargo build --workspace --release
      - name: Tests
        run: cargo test --workspace

  # The SOV Station desktop app (node/) is a SEPARATE cargo workspace the `test`
  # job above does NOT cover. This job gates it (fmt · clippy · tests) so a broken
  # node-start path — like "sov-testnet not built" — can never ship unnoticed again.
  station:
    name: SOV Station app (node/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: node
      - name: Formatting
        run: cd node && cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path node/Cargo.toml --all-targets -- -D warnings
      - name: Tests
        run: cargo test --manifest-path node/Cargo.toml

  # Verification & validity assurance (Phase 7): invariants, consensus model
  # check, deterministic replay, STF conformance, KAT vectors and fault injection
  # are a named, required gate. (They also run inside the workspace tests above;
  # this surfaces them as their own status check.)
  verify:
    name: verify (invariants · model-check · conformance · KAT)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chain
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chain
      - name: Verification suite
        run: cargo test -p sov-verify

  # Smart-contract (guest) static analysis: the wasm32 contracts must pass clippy
  # with warnings denied and build in release.
  contracts:
    name: contracts (wasm32 · clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chain/contracts
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chain/contracts
      - name: Clippy (deny warnings)
        # Lint the real guest targets (lib + any bins), NOT --all-targets: a `no_std`
        # crate that defines a `#[panic_handler]` (the SDK does) cannot link into the
        # std test harness `--all-targets` would build (duplicate `panic_impl` lang
        # item), and wasm32-unknown-unknown has no test runner anyway — so those test
        # targets are both unbuildable and un-runnable. The lib IS the deliverable.
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings
      - name: Build (release wasm)
        run: cargo build --target wasm32-unknown-unknown --release

  # Reproducible builds: build the release binaries twice and assert they are
  # bit-for-bit identical (scripts/reproducible-build.sh).
  reproducible:
    name: reproducible build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.0
      - name: Verify bit-for-bit reproducibility
        run: bash scripts/reproducible-build.sh

  # Supply-chain security gate: cargo-deny fails on any RustSec advisory affecting a
  # dependency AND enforces a version FLOOR on the consensus-critical zk crates, so
  # the patched orchard/halo2_gadgets (which fix the Orchard circuit soundness /
  # shielded-pool forgery bug) can never be silently downgraded. Config: chain/deny.toml.
  supply-chain:
    name: supply-chain (cargo-deny · advisories + zk floor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo-deny (advisories + bans)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: chain/Cargo.toml
          command: check advisories bans

  # The coverage-guided fuzz targets must compile (fuzzing itself runs out-of-band
  # on nightly; this gates that the targets don't bit-rot).
  # Fuzzing (mirrors Bitcoin Core's fuzz jobs): BUILD every target under libFuzzer
  # instrumentation (required), then a short RUN of each so a decoder panic on
  # adversarial input surfaces. The run is trialed (non-blocking) until we've seen it
  # consistently green, then it becomes required.
  fuzz:
    name: fuzz (build + short run)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chain
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chain
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Build fuzz targets
        run: cargo fuzz build
      - name: Run each target (30s)
        continue-on-error: true
        run: |
          for t in $(cargo fuzz list); do
            echo "::group::fuzz $t"
            cargo fuzz run "$t" -- -max_total_time=30 -rss_limit_mb=4096
            echo "::endgroup::"
          done

  # ── Hygiene lint suite (mirrors Bitcoin Core's test/lint/): shell scripts and
  # spelling. Both validated clean, so this is REQUIRED. (rustdoc -D warnings is
  # coming once the accumulated broken-doc-link backlog is cleared.) ──
  hygiene:
    name: hygiene (shellcheck · typos · rustdoc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck (release + build scripts)
        run: shellcheck scripts/*.sh
      - name: Spelling (typos)
        uses: crate-ci/typos@master
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chain
      - name: Docs build clean (rustdoc -D warnings)
        working-directory: chain
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps

  # ── Sanitizers (mirrors Bitcoin's ASan/TSan/MSan matrix, Rust-native). Trialed
  # non-blocking until consistently green on Linux, then promoted to required. ──
  sanitizers:
    name: sanitizers (ASan · Miri) [trial]
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: chain
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, miri
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chain
      - name: AddressSanitizer (consensus · crypto · network)
        env:
          RUSTFLAGS: "-Zsanitizer=address"
        run: cargo +nightly test --target x86_64-unknown-linux-gnu -p sov-chain -p sov-crypto -p sov-network
      - name: Miri (encoding UB — types · primitives)
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"
        run: cargo +nightly miri test -p sov-types -p sov-primitives

  # ── Binary hardening (mirrors Zcash's sec-hard + Bitcoin's check-security),
  # tuned to what a Rust release binary provides. Trialed non-blocking; prints the
  # full checksec/ldd report and asserts PIE (ASLR). ──
  hardening:
    name: hardening (checksec release binary) [trial]
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: chain
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chain
      - name: Build release daemon
        run: cargo build --release -p sov-rpc --bin sov-rpcd
      - name: Install checkers
        run: sudo apt-get update && sudo apt-get install -y checksec
      - name: Hardening report + assert PIE/NX
        run: |
          BIN=target/release/sov-rpcd
          echo "== file =="; file "$BIN"
          echo "== checksec =="; checksec --file="$BIN" || true
          echo "== dynamic deps =="; ldd "$BIN" || true
          # PIE (ASLR): the most important, reliably detectable via `file`.
          file "$BIN" | grep -q "pie executable" || { echo "FAIL: binary is not PIE"; exit 1; }
          # NX: GNU_STACK must not be executable (RW, not RWE).
          readelf -l "$BIN" | grep -A1 GNU_STACK | grep -q "RWE" && { echo "FAIL: executable stack"; exit 1; } || true
          echo "OK: PIE + non-exec stack (canary/FORTIFY are report-only for Rust)"
