# cargo-audit baseline for the sov-station (node/GUI) workspace.
#
# Policy: `cargo audit` must report ZERO vulnerabilities and ZERO yanked crates.
# The entries below are *informational* advisories (unmaintained crates) reached
# only transitively through audited upstream dependencies, with no runtime attack
# surface for sov-station. Each is ignored by its specific ID — never a blanket
# suppression — so any NEW advisory still fails the audit. Re-review each when
# its upstream parent is bumped.
#
# Run:  cargo audit --deny warnings   (CI-equivalent: must exit 0)

[advisories]
ignore = [
  # atomic-polyfill 1.0.3 — UNMAINTAINED.
  # Reached only via heapless 0.7 (an OPTIONAL, feature-gated dependency of
  # postcard); compiles only on no-native-atomics targets (e.g. thumbv6m), which
  # SOV does not target. Never built into any sov-station artifact.
  "RUSTSEC-2023-0089",

  # paste 1.0.15 — UNMAINTAINED.
  # Build-time proc-macro pulled by accesskit_windows -> accesskit_winit ->
  # egui-winit -> eframe (the cross-platform GUI framework). Windows-only
  # accessibility code path; proc-macro runs at compile time only and ships in no
  # binary. Removing it requires an upstream eframe/accesskit change. Re-check on
  # eframe bump.
  "RUSTSEC-2024-0436",
]
